<div class="position-absolute top-50 start-50 translate-middle">
  <form>
    <h1 class="h1">Регистрация</h1>
    <div class="mb-2">
      <label for="name" class="form-label">Фамилия</label>
      <input type="text" class="form-control" id="name" aria-describedby="emailHelp">
    </div>
    <div class="mb-2">
      <label for="surname" class="form-label">Имя</label>
      <input type="text" class="form-control" id="surname" aria-describedby="emailHelp">
    </div>
    <div class="mb-2">
      <label for="patronymic" class="form-label">Отчество</label>
      <input type="text" class="form-control" id="patronymic" aria-describedby="emailHelp">
    </div>
    <div class="mb-2">
      <label for="username" class="form-label">Имя пользователя</label>
      <input type="text" class="form-control" id="username" aria-describedby="emailHelp">
    </div>
    <div class="mb-2">
      <label for="email" class="form-label">Почта</label>
      <input type="email" class="form-control" id="email" aria-describedby="emailHelp">
    </div>
    <div class="mb-2">
      <label for="password" class="form-label">Пароль</label>
      <input type="password" class="form-control" id="password">
    </div>
    <a type="submit" class="btn btn-primary w-100x">Зарегистрироваться</a>
  </form>
</div>
